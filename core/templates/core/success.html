{% extends 'core/base.html' %}
{% block content %}
<style>
    /* Premium Success Accent Glow Components */
    .success-glow-pill {
        background: rgba(16, 185, 129, 0.08);
        border: 1px solid rgba(16, 185, 129, 0.2);
        color: #34d399 !important;
        letter-spacing: 0.05em;
    }

    .success-icon-wrapper {
        width: 80px;
        height: 80px;
        background: rgba(16, 185, 129, 0.06);
        border: 1px solid rgba(16, 185, 129, 0.15);
        box-shadow: 0 0 30px rgba(16, 185, 129, 0.1);
    }

    /* Mail Tracking Info Notice Grid */
    .mail-alert-box {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        max-width: 540px;
    }

    /* Dark Premium Mode Action Button CTA */
    .btn-success-home {
        background-color: #ffffff;
        color: #030712;
        font-weight: 700;
        border: 1px solid #ffffff;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-success-home:hover {
        background-color: transparent;
        color: #ffffff;
        border-color: var(--accent-blue, #3b82f6);
        box-shadow: 0 6px 20px rgba(59, 130, 246, 0.15);
        transform: translateY(-1px);
    }
</style>

<div class="row justify-content-center align-items-center py-5 my-md-4">
    <div class="col-md-8 col-lg-6 text-center">
        
        <div class="success-icon-wrapper rounded-circle d-flex align-items-center justify-content-center mx-auto mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="#34d399" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
            </svg>
        </div>

        <span class="badge success-glow-pill px-3 py-2 rounded-pill text-uppercase mb-3 fw-bold small">Submission Received</span>
        
        <h1 class="display-4 fw-bold text-white mb-3" style="letter-spacing: -0.03em;">Application Sent!</h1>
        <p class="fs-5 mx-auto mb-4" style="color: #cbd5e1; max-width: 500px; line-height: 1.6;">
            Thank you for reaching out. The STEMforNepal management team is reviewing your profile tracks and skills.
        </p>

        <div class="mail-alert-box mx-auto p-3 rounded-4 d-flex align-items-center justify-content-center mb-4">
            <span class="small text-start" style="color: #94a3b8; line-height: 1.4;">
                Further updates on your application will be sent <b>via mail</b>.
            </span>
        </div>

        <div class="pt-2">
            <a href="{% url 'home' %}" class="btn btn-success-home px-4 py-2.5 rounded-pill text-uppercase tracking-wide small shadow-lg">
                Back to Home
            </a>
        </div>

    </div>
</div>
{% endblock %}
